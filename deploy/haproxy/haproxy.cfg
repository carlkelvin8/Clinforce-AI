global
    log stdout format raw local0
    daemon
    maxconn 10000

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5s
    timeout client  60s
    timeout server  60s
    retries 3

frontend fe_http
    bind *:80
    option forwardfor
    http-request set-header X-Forwarded-Proto http if !{ ssl_fc }
    default_backend be_app

backend be_app
    balance leastconn
    option httpchk GET /api/health
    http-check expect status 200
    # Session stickiness (optional; comment out to disable)
    cookie SRVID insert indirect nocache httponly secure
    server app1 app1:8000 check inter 3000 fall 2 rise 3 maxconn 2000 cookie A weight 100
    server app2 app2:8000 check inter 3000 fall 2 rise 3 maxconn 2000 cookie B weight 100
    server app3 app3:8000 check inter 3000 fall 2 rise 3 maxconn 2000 cookie C weight 100

listen stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats show-node
    stats show-legends

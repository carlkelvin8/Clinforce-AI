apiVersion: apps/v1
kind: Deployment
metadata:
  name: clinforce-app
  labels:
    app: clinforce
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: clinforce
      tier: web
  template:
    metadata:
      labels:
        app: clinforce
        tier: web
    spec:
      containers:
        - name: web
          image: ghcr.io/your-org/clinforce-ai:latest
          ports:
            - containerPort: 8000
          env:
            - name: APP_ENV
              value: production
            - name: APP_DEBUG
              value: "false"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            timeoutSeconds: 2
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            timeoutSeconds: 2
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
